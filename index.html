<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PockiBox</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<h2>🎁 PockiBox Wishlist</h2>

<!-- WISHES -->
<div id="my" class="section active">

  <div class="card">
    <input id="title" placeholder="Что хочешь?" />
    <input id="price" placeholder="Цена" />
    <button onclick="addWish()">Добавить</button>
  </div>

  <div id="myList"></div>
</div>

<!-- FEED -->
<div id="feed" class="section">
  <div class="card muted">Лента пока пустая</div>
</div>

<!-- FRIENDS -->
<div id="friends" class="section">

  <div class="card">
    <button onclick="inviteFriend()">📨 Пригласить друга</button>
    <div class="muted">Поделись ссылкой</div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('my', this)">Мои</div>
  <div class="tab" onclick="switchTab('feed', this)">Лента</div>
  <div class="tab" onclick="switchTab('friends', this)">Друзья</div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* INIT */
async function init() {
  if (!user) return;

  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username
    })
  });

  loadWishes();
}

init();

/* TABS */
function switchTab(tab, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  el.classList.add('active');
}

/* INVITE */
function inviteFriend() {
  const link = `https://t.me/PockiBoxBot?startapp=${user.id}`;
  navigator.clipboard.writeText(link);

  tg.openTelegramLink(
    `https://t.me/share/url?url=${encodeURIComponent(link)}&text=🎁 PockiBox Wishlist`
  );
}

/* WISHES */
async function addWish() {
  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title: title.value,
      price: price.value,
      status: "active"
    })
  });

  loadWishes();
}

async function loadWishes() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  myList.innerHTML = data.map(w => `
    <div class="card">
      🎁 <b>${w.title}</b><br>
      <span class="muted">${w.price || ""}</span>
    </div>
  `).join("");
}

</script>

</body>
</html>
