<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist Social</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system;
      background: #0b0c10;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 12px;
      border-radius: 16px;
      margin: 10px 0;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 12px;
      border: none;
    }

    button {
      background: #4f8cff;
      color: white;
      font-weight: 600;
    }

    .muted {
      opacity: 0.6;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>🎁 Wishlist Social</h2>

<div class="card">
  <input id="title" placeholder="Что хочешь?" />
  <input id="price" placeholder="Цена" />
  <button onclick="addWish()">Добавить</button>
</div>

<h3>Мои желания</h3>
<div id="myWishes"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

/* =====================
   SUPABASE
===================== */
const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* =====================
   GET REFERRER (🔥 ВАЖНО)
===================== */
const startParam = tg.initDataUnsafe?.start_param;
const referrerId = startParam ? Number(startParam) : null;

/* =====================
   INIT USER + AUTO FRIEND
===================== */
async function init() {
  if (!user) return;

  // создаём пользователя
  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username
    })
  });

  // 🔥 если пришёл по ссылке — автоматически друг
  if (referrerId && referrerId !== user.id) {
    await fetch(`${SUPABASE_URL}/rest/v1/friendships`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: referrerId,
        friend_id: user.id,
        status: "accepted"
      })
    });
  }

  loadWishes();
}

init();

/* =====================
   WISHES
===================== */
async function addWish() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;

  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title,
      price,
      status: "active"
    })
  });

  loadWishes();
}

async function loadWishes() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  document.getElementById("myWishes").innerHTML =
    data.map(w => `
      <div class="card">
        🎁 ${w.title}<br>
        <span class="muted">${w.price || ""}</span>
      </div>
    `).join("");
}

</script>

</body>
</html>
