<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist Social</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #0f1115;
      --card: rgba(255,255,255,0.06);
      --card2: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.1);
      --text: #fff;
      --muted: rgba(255,255,255,0.6);
      --accent: #7c5cff;
      --accent2: #4fd1c5;
      --radius: 18px;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display";
      background: var(--bg);
      color: var(--text);
    }

    h2 {
      margin: 10px 0 14px;
      font-size: 22px;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .share {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--card2);
      border: 1px solid var(--border);
      font-size: 13px;
      cursor: pointer;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 8px;
      margin: 10px 0 16px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 999px;
      text-align: center;
      background: var(--card);
      color: var(--muted);
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      transform: scale(1.02);
    }

    /* CARDS */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin: 10px 0;
      backdrop-filter: blur(10px);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .muted {
      font-size: 12px;
      opacity: 0.6;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .wish-title {
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2>🎁 Wishlist</h2>
  <div class="share" onclick="shareApp()">📤 Share</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('wishes', this)">Мои</div>
  <div class="tab" onclick="showTab('feed', this)">Лента</div>
  <div class="tab" onclick="showTab('friends', this)">Друзья</div>
</div>

<!-- ================= WISHES ================= -->
<div id="wishes" class="section active">

  <div class="card">
    <input id="title" placeholder="Что хочешь?" />
    <input id="price" placeholder="Цена" />
    <button onclick="addWish()">Добавить желание</button>
  </div>

  <div id="myWishes"></div>
</div>

<!-- ================= FEED ================= -->
<div id="feed" class="section">
  <div id="feedList" class="card">
    <div class="muted">Лента появится позже</div>
  </div>
</div>

<!-- ================= FRIENDS ================= -->
<div id="friends" class="section">

  <div class="card">
    <input id="searchUser" placeholder="username пользователя" />
    <button onclick="sendRequest()">Добавить в друзья</button>
  </div>

  <div class="card">
    <div class="muted">Входящие запросы</div>
    <div id="requests"></div>
  </div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* ================= SHARE ================= */
function shareApp() {
  const link = `https://t.me/YOUR_BOT_USERNAME?startapp=${user.id}`;
  tg.openTelegramLink(link);
}

/* ================= TABS FIX ================= */
function showTab(tab, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  el.classList.add('active');
}

/* ================= INIT ================= */
async function init() {
  if (!user) return;

  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username
    })
  });

  loadWishes();
}

init();

/* ================= WISHES ================= */
async function addWish() {
  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title: title.value,
      price: price.value,
      status: "active"
    })
  });

  loadWishes();
}

async function loadWishes() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  myWishes.innerHTML = data.map(w => `
    <div class="card">
      🎁 <b>${w.title}</b><br>
      <span class="muted">${w.price || ""}</span>
    </div>
  `).join("");
}

/* ================= FRIEND REQUESTS ================= */
async function sendRequest() {
  const username = searchUser.value;

  const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${username}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();
  if (!data.length) return alert("не найден");

  const toUser = data[0].telegram_id;

  await fetch(`${SUPABASE_URL}/rest/v1/friend_requests`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      from_user: user.id,
      to_user: toUser,
      status: "pending"
    })
  });

  alert("Запрос отправлен");
}

</script>

</body>
</html>
