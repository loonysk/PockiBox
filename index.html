<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist Social</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      padding: 16px;
      padding-bottom: 80px;
      font-family: -apple-system;
      background: #0f1115;
      color: white;
    }

    h2 { margin: 10px 0; }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #7c5cff;
      color: white;
      font-weight: 600;
    }

    .tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: rgba(20,20,25,0.95);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: rgba(255,255,255,0.6);
    }

    .tab.active {
      color: white;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .muted {
      opacity: 0.6;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>🎁 Wishlist Social</h2>

<!-- ================= MY ================= -->
<div id="my" class="section active">

  <div class="card">
    <input id="title" placeholder="Что хочешь?" />
    <input id="price" placeholder="Цена" />
    <button onclick="addWish()">Добавить желание</button>
  </div>

  <div id="myList"></div>
</div>

<!-- ================= FEED ================= -->
<div id="feed" class="section">
  <div class="card">
    <div class="muted">Лента пока пустая</div>
  </div>
</div>

<!-- ================= FRIENDS ================= -->
<div id="friends" class="section">

  <div class="card">
    <button onclick="inviteFriend()">📨 Пригласить друга</button>
    <div class="muted">Отправь ссылку — друг автоматически добавится</div>
  </div>

  <div class="card">
    <div class="muted">Друзья появятся тут</div>
  </div>

</div>

<!-- ================= BOTTOM NAV ================= -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('my', this)">Мои</div>
  <div class="tab" onclick="switchTab('feed', this)">Лента</div>
  <div class="tab" onclick="switchTab('friends', this)">Друзья</div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
const referrerId = tg.initDataUnsafe?.start_param; // 🔥 ВАЖНО

const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* ================= INIT ================= */
async function init() {
  if (!user) return;

  // создаём юзера
  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username
    })
  });

  // 💥 АВТО-ДРУЖБА ПО ССЫЛКЕ
  if (referrerId && Number(referrerId) !== user.id) {
    await fetch(`${SUPABASE_URL}/rest/v1/friend_requests`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        from_user: Number(referrerId),
        to_user: user.id,
        status: "accepted"
      })
    });
  }

  loadWishes();
}

init();

/* ================= TABS ================= */
function switchTab(tab, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  el.classList.add('active');
}

/* ================= INVITE ================= */
function inviteFriend() {
  const link = `https://t.me/YOUR_BOT_USERNAME?startapp=${user.id}`;

  navigator.clipboard.writeText(link);

  tg.openTelegramLink(
    `https://t.me/share/url?url=${encodeURIComponent(link)}&text=🎁 Присоединяйся к моему вишлисту`
  );
}

/* ================= WISHES ================= */
async function addWish() {
  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title: title.value,
      price: price.value,
      status: "active"
    })
  });

  loadWishes();
}

async function loadWishes() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  myList.innerHTML = data.map(w => `
    <div class="card">
      🎁 <b>${w.title}</b><br>
      <span class="muted">${w.price || ""}</span>
    </div>
  `).join("");
}

</script>

</body>
</html>
