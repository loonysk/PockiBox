<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Wishlist App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    input {
      display: block;
      margin: 8px 0;
      padding: 10px;
      width: 100%;
      max-width: 320px;
    }

    button {
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
    }

    li {
      margin: 8px 0;
    }

    .card {
      padding: 10px;
      border: 1px solid #ddd;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h2>🎁 Wishlist</h2>

<!-- ADD WISH -->
<input id="title" placeholder="Что хочешь?" />
<input id="price" placeholder="Цена" />
<button onclick="addWish()">Добавить желание</button>

<h3>Мои желания</h3>
<ul id="list"></ul>

<hr>

<!-- FRIENDS -->
<h3>👥 Друзья</h3>

<input id="friendId" placeholder="Telegram ID друга" />
<button onclick="addFriend()">Добавить в друзья</button>

<h4>Запросы в друзья</h4>
<div id="friendRequests"></div>

<script>
/* =======================
   TELEGRAM INIT
======================= */
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

/* =======================
   SUPABASE
======================= */
const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* =======================
   INIT USER
======================= */
async function initUser() {
  if (!user) return;

  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username,
      first_name: user.first_name
    })
  });

  loadWishes();
  loadFriendRequests();
}

/* =======================
   WISHES
======================= */
async function loadWishes() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  document.getElementById("list").innerHTML = data.map(w => `
    <li class="card">
      🎁 <b>${w.title}</b> — ${w.price || ""}

      <br/>

      ${
        w.status === "reserved"
          ? `🔒 Зарезервировано`
          : `<button onclick="reserveWish(${w.id})">Забронировать</button>`
      }
    </li>
  `).join("");
}

async function addWish() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;

  if (!title) return;

  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title,
      price,
      status: "active"
    })
  });

  document.getElementById("title").value = "";
  document.getElementById("price").value = "";

  loadWishes();
}

/* =======================
   RESERVE WISH (🔥 фича)
======================= */
async function reserveWish(wishId) {
  await fetch(`${SUPABASE_URL}/rest/v1/wishes?id=eq.${wishId}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      status: "reserved",
      reserved_by: user.id
    })
  });

  loadWishes();
}

/* =======================
   FRIENDS
======================= */
async function addFriend() {
  const friendId = document.getElementById("friendId").value;

  if (!friendId) return;

  await fetch(`${SUPABASE_URL}/rest/v1/friendships`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      friend_id: Number(friendId),
      status: "pending"
    })
  });

  alert("Запрос отправлен 👌");
  loadFriendRequests();
}

async function loadFriendRequests() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/friendships?friend_id=eq.${user.id}&status=eq.pending`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  document.getElementById("friendRequests").innerHTML = data.map(f => `
    <div class="card">
      👤 Запрос от: ${f.user_id}
      <br/>
      <button onclick="acceptFriend(${f.id})">Принять</button>
    </div>
  `).join("");
}

async function acceptFriend(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/friendships?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      status: "accepted"
    })
  });

  loadFriendRequests();
}

/* =======================
   START
======================= */
initUser();

</script>

</body>
</html>
