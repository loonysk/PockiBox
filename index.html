<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PockiBox</title>

  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<h2>🎁 PockiBox Social</h2>

<!-- ================= WISHES ================= -->
<div id="my" class="section active">

  <div class="card">
    <input id="title" placeholder="Что хочешь?" />
    <input id="price" placeholder="Цена" />
    <button onclick="addWish()">Добавить желание</button>
  </div>

  <div id="myList"></div>
</div>

<!-- ================= FEED ================= -->
<div id="feed" class="section">
  <div id="feedList"></div>
</div>

<!-- ================= FRIENDS ================= -->
<div id="friends" class="section">

  <div class="card">
    <input id="usernameInput" placeholder="@username" />
    <button onclick="addFriend()">➕ Добавить друга</button>
    <div class="muted" id="friendMsg"></div>
  </div>

  <div class="card">
    <b>📥 Заявки</b>
    <div id="requestsList"></div>
  </div>

  <div class="card">
    <b>👥 Мои друзья</b>
    <div id="friendsList"></div>
  </div>

  <div class="card">
    <button onclick="inviteFriend()">📨 Пригласить друга</button>
  </div>

</div>

<!-- ================= BOTTOM NAV ================= -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('my', this)">Мои</div>
  <div class="tab" onclick="switchTab('feed', this)">Лента</div>
  <div class="tab" onclick="switchTab('friends', this)">Друзья</div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
const referrerId = tg.initDataUnsafe?.start_param;

const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* ================= INIT ================= */
async function init() {
  if (!user) return;

  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username
    })
  });

  // referral auto-friend
  if (referrerId && Number(referrerId) !== user.id) {
    await fetch(`${SUPABASE_URL}/rest/v1/friends`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: Number(referrerId),
        friend_id: user.id,
        status: "accepted"
      })
    });
  }

  loadWishes();
  loadFriends();
  loadRequests();
  loadFeed();
}

init();

/* ================= TABS ================= */
function switchTab(tab, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  el.classList.add('active');
}

/* ================= INVITE ================= */
function inviteFriend() {
  const link = `https://t.me/PockiBoxBot?startapp=${user.id}`;

  navigator.clipboard.writeText(link);

  tg.openTelegramLink(
    `https://t.me/share/url?url=${encodeURIComponent(link)}&text=🎁 PockiBox Wishlist`
  );
}

/* ================= WISHES ================= */
async function addWish() {
  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title: title.value,
      price: price.value
    })
  });

  await addFeed("добавил желание");
  loadWishes();
  loadFeed();
}

async function loadWishes() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  myList.innerHTML = data.map(w => `
    <div class="card">
      🎁 <b>${w.title}</b><br>
      <span class="muted">${w.price || ""}</span><br><br>
      <button onclick="reserveWish()">🎁 Забронировать</button>
    </div>
  `).join("");
}

/* ================= FEED ================= */
async function addFeed(text) {
  await fetch(`${SUPABASE_URL}/rest/v1/feed`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      text: `${user.username || "user"} ${text}`
    })
  });
}

async function loadFeed() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/feed?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  feedList.innerHTML = data.reverse().map(f => `
    <div class="card">
      🧡 ${f.text}
    </div>
  `).join("");
}

/* ================= FRIENDS ================= */
async function addFriend() {
  const username = usernameInput.value.replace("@", "");

  const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${username}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  if (!data.length) {
    friendMsg.innerHTML = "❌ Пользователь не найден. Пригласи его:";
    return;
  }

  const friend = data[0];

  await fetch(`${SUPABASE_URL}/rest/v1/friends`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      friend_id: friend.telegram_id,
      status: "pending"
    })
  });

  friendMsg.innerHTML = "📨 Заявка отправлена";
}

/* ================= REQUESTS ================= */
async function loadRequests() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/friends?friend_id=eq.${user.id}&status=eq.pending`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  requestsList.innerHTML = data.map(r => `
    <div class="card">
      👤 Заявка от ${r.user_id}
      <button onclick="acceptFriend(${r.id})">Принять</button>
    </div>
  `).join("");
}

async function acceptFriend(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/friends?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      status: "accepted"
    })
  });

  loadRequests();
  loadFriends();
}

/* ================= FRIENDS LIST ================= */
async function loadFriends() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/friends?user_id=eq.${user.id}&status=eq.accepted`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  friendsList.innerHTML = data.map(f => `
    <div class="card">
      👤 friend id: ${f.friend_id}
    </div>
  `).join("");
}

/* ================= RESERVE ================= */
function reserveWish() {
  alert("🎁 Забронировано");
}

</script>

</body>
</html>
