<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #0b0c10;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.1);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.6);
      --accent: #4f8cff;
      --danger: #ff4d4d;
      --radius: 16px;
    }

    body {
      margin: 0;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    h3 {
      margin-top: 22px;
      font-size: 16px;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin: 10px 0;
      backdrop-filter: blur(10px);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(255,255,255,0.08);
    }

    button.danger {
      background: var(--danger);
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row button {
      flex: 1;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .wish-title {
      font-weight: 600;
    }
  </style>
</head>

<body>

<h2>🎁 Wishlist</h2>

<div class="card">
  <input id="title" placeholder="Что хочешь?" />
  <input id="price" placeholder="Цена" />
  <button onclick="addWish()">Добавить желание</button>
</div>

<h3>Мои желания</h3>
<div id="list"></div>

<h3>👥 Друзья</h3>

<div class="card">
  <input id="friendId" placeholder="Telegram ID друга" />
  <button onclick="addFriend()">Добавить в друзья</button>
</div>

<h3>📩 Запросы</h3>
<div id="friendRequests"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* =====================
   INIT USER
===================== */
async function initUser() {
  if (!user) return;

  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username,
      first_name: user.first_name
    })
  });

  loadWishes();
  loadFriendRequests();
}

/* =====================
   WISHES
===================== */
async function loadWishes() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  document.getElementById("list").innerHTML = data.map(w => `
    <div class="card">
      <div class="wish-title">🎁 ${w.title}</div>
      <div class="muted">${w.price || ""}</div>

      <div class="row">
        ${
          w.status === "reserved"
            ? `<button class="secondary">🔒 Зарезервировано</button>`
            : `<button onclick="reserveWish(${w.id})">Забронировать</button>`
        }
      </div>
    </div>
  `).join("");
}

async function addWish() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;

  if (!title) return;

  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title,
      price,
      status: "active"
    })
  });

  document.getElementById("title").value = "";
  document.getElementById("price").value = "";

  loadWishes();
}

/* =====================
   RESERVE
===================== */
async function reserveWish(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/wishes?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      status: "reserved",
      reserved_by: user.id
    })
  });

  loadWishes();
}

/* =====================
   FRIENDS
===================== */
async function addFriend() {
  const friendId = document.getElementById("friendId").value;

  if (!friendId) return;

  await fetch(`${SUPABASE_URL}/rest/v1/friendships`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      friend_id: Number(friendId),
      status: "pending"
    })
  });

  loadFriendRequests();
}

async function loadFriendRequests() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/friendships?friend_id=eq.${user.id}&status=eq.pending`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  document.getElementById("friendRequests").innerHTML = data.map(f => `
    <div class="card">
      👤 ${f.user_id}
      <button onclick="acceptFriend(${f.id})">Принять</button>
    </div>
  `).join("");
}

async function acceptFriend(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/friendships?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      status: "accepted"
    })
  });

  loadFriendRequests();
}

/* =====================
   START
===================== */
initUser();

</script>

</body>
</html>
