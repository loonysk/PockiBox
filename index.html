<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist Social</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #0f1115;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.1);
      --text: #fff;
      --muted: rgba(255,255,255,0.6);
      --accent: #7c5cff;
      --accent2: #4fd1c5;
    }

    body {
      margin: 0;
      padding: 16px;
      padding-bottom: 80px;
      font-family: -apple-system;
      background: var(--bg);
      color: var(--text);
    }

    h2 { margin: 10px 0; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      margin: 10px 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 600;
    }

    .muted {
      font-size: 12px;
      opacity: 0.6;
    }

    .section {
      display: none;
    }

    .active {
      display: block;
    }

    /* BOTTOM NAV */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: rgba(20,20,25,0.95);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .nav button {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      padding: 14px;
      font-size: 13px;
    }

    .nav button.active {
      color: white;
    }
  </style>
</head>

<body>

<h2>🎁 Wishlist</h2>

<!-- ================= MY WISHES ================= -->
<div id="wishes" class="section active">

  <div class="card">
    <input id="title" placeholder="Что хочешь?" />
    <input id="price" placeholder="Цена" />
    <button onclick="addWish()">Добавить</button>
  </div>

  <div id="myWishes"></div>

</div>

<!-- ================= FEED ================= -->
<div id="feed" class="section">
  <div class="card">
    <div class="muted">Лента пока пустая</div>
  </div>
</div>

<!-- ================= FRIENDS ================= -->
<div id="friends" class="section">

  <div class="card">
    <button onclick="inviteFriend()">📨 Пригласить друга</button>
    <div class="muted" style="margin-top:8px">
      Поделись ссылкой — друг автоматически добавится при входе
    </div>
  </div>

  <div class="card">
    <div class="muted">Здесь будет список друзей</div>
  </div>

</div>

<!-- ================= BOTTOM NAV ================= -->
<div class="nav">
  <button class="active" onclick="switchTab('wishes', this)">Мои</button>
  <button onclick="switchTab('feed', this)">Лента</button>
  <button onclick="switchTab('friends', this)">Друзья</button>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* ================= INIT ================= */
async function init() {
  if (!user) return;

  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username
    })
  });

  loadWishes();
}

init();

/* ================= TABS ================= */
function switchTab(tab, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  el.classList.add('active');
}

/* ================= INVITE FRIEND ================= */
function inviteFriend() {
  const link = `https://t.me/YOUR_BOT_USERNAME?startapp=${user.id}`;

  // 1. копируем в буфер
  navigator.clipboard.writeText(link);

  // 2. пытаемся открыть Telegram share
  if (tg.openTelegramLink) {
    tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Присоединяйся к моему вишлисту 🎁`);
  } else {
    alert("Ссылка скопирована: " + link);
  }
}

/* ================= WISHES ================= */
async function addWish() {
  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title: title.value,
      price: price.value,
      status: "active"
    })
  });

  loadWishes();
}

async function loadWishes() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  myWishes.innerHTML = data.map(w => `
    <div class="card">
      🎁 <b>${w.title}</b><br>
      <span class="muted">${w.price || ""}</span>
    </div>
  `).join("");
}

</script>

</body>
</html>
