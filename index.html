<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PockiBox Social</title>

  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<h2>🎁 PockiBox</h2>

<!-- ================= PROFILE ================= -->
<div id="profile" class="section">
  <div class="card" id="profileCard"></div>
  <div id="profileWishes"></div>
  <button onclick="closeProfile()">← Назад</button>
</div>

<!-- ================= MY ================= -->
<div id="my" class="section active">

  <div class="card">
    <input id="title" placeholder="Что хочешь?" />
    <input id="price" placeholder="Цена" />
    <button onclick="addWish()">Добавить</button>
  </div>

  <div id="myList"></div>
</div>

<!-- ================= FEED ================= -->
<div id="feed" class="section">
  <div id="feedList"></div>
</div>

<!-- ================= FRIENDS ================= -->
<div id="friends" class="section">

  <div class="card">
    <input id="usernameInput" placeholder="@username" />
    <button onclick="addFriend()">➕ Добавить друга</button>
    <div class="muted" id="friendMsg"></div>
  </div>

  <div class="card">
    <b>👥 Друзья</b>
    <div id="friendsList"></div>
  </div>

</div>

<!-- ================= NAV ================= -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('my', this)">Мои</div>
  <div class="tab" onclick="switchTab('feed', this)">Лента</div>
  <div class="tab" onclick="switchTab('friends', this)">Друзья</div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

const SUPABASE_URL = "https://wgrurjbmndghdsbogmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_ksR28g5qpcdV3Ef9tSRNxg_IeJSeqTm";

/* ================= INIT ================= */
async function init() {
  if (!user) return;

  await fetch(`${SUPABASE_URL}/rest/v1/users`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      telegram_id: user.id,
      username: user.username
    })
  });

  loadWishes();
  loadFriends();
  loadFeed();
}

init();

/* ================= TABS ================= */
function switchTab(tab, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  el.classList.add('active');
}

/* ================= FRIEND MODEL FIX ================= */
function normalizePair(a, b) {
  return {
    user_a: Math.min(a, b),
    user_b: Math.max(a, b)
  };
}

/* ================= ADD FRIEND ================= */
async function addFriend() {
  const username = usernameInput.value.replace("@", "");

  const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${username}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  if (!data.length) {
    friendMsg.innerHTML = "❌ Пользователь не найден";
    return;
  }

  const friendId = data[0].telegram_id;

  const pair = normalizePair(user.id, friendId);

  await fetch(`${SUPABASE_URL}/rest/v1/friends`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_a: pair.user_a,
      user_b: pair.user_b,
      status: "pending"
    })
  });

  friendMsg.innerHTML = "📨 заявка отправлена";
}

/* ================= LOAD FRIENDS ================= */
async function loadFriends() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/friends?or=(user_a.eq.${user.id},user_b.eq.${user.id})&status=eq.accepted`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  friendsList.innerHTML = data.map(f => {
    const friendId = f.user_a === user.id ? f.user_b : f.user_a;

    return `
      <div class="card" onclick="openProfile(${friendId})">
        👤 друг: ${friendId}
      </div>
    `;
  }).join("");
}

/* ================= PROFILE ================= */
async function openProfile(id) {

  const res = await fetch(`${SUPABASE_URL}/rest/v1/users?telegram_id=eq.${id}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const u = await res.json();
  const profile = u[0];

  const w = await fetch(`${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${id}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const wishes = await w.json();

  profileCard.innerHTML = `
    <div class="card">
      👤 <b>@${profile.username}</b><br>
      🎁 ${wishes.length} wishes
    </div>
  `;

  profileWishes.innerHTML = wishes.map(x => `
    <div class="card">
      🎁 ${x.title}
    </div>
  `).join("");

  switchTab('profile', {});
}

/* ================= CLOSE PROFILE ================= */
function closeProfile() {
  switchTab('friends', document.querySelectorAll('.tab')[2]);
}

/* ================= WISHES ================= */
async function addWish() {
  await fetch(`${SUPABASE_URL}/rest/v1/wishes`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.id,
      title: title.value,
      price: price.value
    })
  });

  loadWishes();
}

async function loadWishes() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/wishes?user_id=eq.${user.id}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  myList.innerHTML = data.map(w => `
    <div class="card">
      🎁 ${w.title}
    </div>
  `).join("");
}

/* ================= FEED ================= */
async function loadFeed() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/feed?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  feedList.innerHTML = data.reverse().map(f => `
    <div class="card">
      🧡 ${f.text}
    </div>
  `).join("");
}

</script>

</body>
</html>
